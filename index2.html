<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0b0d0f;
    --bg2:      #0e1114;
    --bg3:      #121518;
    --border:   #1e2226;
    --border2:  #2a2e32;
    --text:     #d8dde2;
    --muted:    #778;
    --dim:      #445;
    --green:    #22dd88;
    --red:      #e03355;
    --font-mono: 'DM Mono', 'Courier New', monospace;
    --font-disp: 'Syne', 'Arial Black', sans-serif;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }

  html { background: var(--bg); }

  body {
    font-family: var(--font-mono);
    background: var(--bg);
    background-image:
      repeating-linear-gradient(0deg,   #ffffff03 0px, #ffffff03 1px, transparent 1px, transparent 44px),
      repeating-linear-gradient(90deg,  #ffffff03 0px, #ffffff03 1px, transparent 1px, transparent 44px);
    color: var(--text);
    min-height: 100dvh;
    padding-bottom: calc(var(--safe-bot) + 24px);
    -webkit-tap-highlight-color: transparent;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 200;
    background: #0b0d0fdd;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: calc(var(--safe-top) + 10px) 16px 10px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .header-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .pulse-dot {
    width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
    background: var(--green); box-shadow: 0 0 10px var(--green);
    animation: pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; box-shadow: 0 0 8px var(--green); }
    50%      { opacity:.5; box-shadow: 0 0 18px var(--green); }
  }
  .logo { font-family: var(--font-disp); font-size: 1.35rem; font-weight: 900; letter-spacing: .12em; color: #fff; white-space: nowrap; }
  .logo span { color: var(--green); }
  .header-date { font-size: .6rem; color: var(--dim); letter-spacing: .08em; white-space: nowrap; }
  .legend { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .legend-bar { width: 72px; height: 7px; border-radius: 4px; background: linear-gradient(90deg, #e03355, #333, #22dd88); }
  .legend-label { font-size: .55rem; color: var(--dim); letter-spacing: .06em; }

  /* ── CONTROLS ── */
  .controls {
    padding: 10px 14px 8px;
    border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 8px;
  }
  .search-wrap {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: 8px; padding: 7px 12px;
  }
  .search-icon { font-size: 1.05rem; color: var(--dim); }
  #search {
    background: none; border: none; outline: none;
    color: var(--text); font-family: var(--font-mono); font-size: .8rem; flex: 1;
    -webkit-appearance: none;
  }
  #search::placeholder { color: var(--dim); }

  .ctrl-row { display: flex; align-items: flex-start; gap: 8px; }
  .ctrl-label { font-size: .58rem; color: var(--dim); letter-spacing: .1em; white-space: nowrap; padding-top: 5px; min-width: 44px; }
  .pills { display: flex; flex-wrap: wrap; gap: 4px; }
  .pill {
    padding: 4px 9px; border-radius: 5px; border: 1px solid var(--border2);
    background: var(--bg2); color: var(--muted); font-family: var(--font-mono);
    font-size: .62rem; cursor: pointer; letter-spacing: .04em;
    transition: all .15s; white-space: nowrap; -webkit-appearance: none;
  }
  .pill.active { background: #1a2e22; border-color: var(--green); color: var(--green); }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex; overflow-x: auto; gap: 0;
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .stats-bar::-webkit-scrollbar { display: none; }
  .stat-chip {
    display: flex; flex-direction: column; gap: 2px;
    padding: 7px 14px; border-right: 1px solid var(--border); flex-shrink: 0;
  }
  .chip-label { font-size: .52rem; color: var(--dim); letter-spacing: .1em; }
  .chip-value { font-size: .82rem; color: var(--text); font-weight: 700; }
  .chip-value.green { color: var(--green); }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
    gap: 8px;
    padding: 14px;
  }
  @media (max-width: 400px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 7px; padding: 10px; }
  }

  /* ── TILE ── */
  .tile {
    border-radius: 9px; border: 1px solid;
    padding: 12px 12px 9px;
    cursor: pointer; position: relative;
    transition: transform .18s, box-shadow .18s;
    animation: fadeUp .35s ease both;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
  }
  .tile:active { transform: scale(.96) !important; }
  @media (hover: hover) { .tile:hover { transform: scale(1.03); z-index: 5; } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:translateY(0) } }

  .rank { position: absolute; top: 5px; right: 7px; font-size: .52rem; color: var(--dim); }
  .sector-dot { position: absolute; top: 6px; left: 7px; width: 5px; height: 5px; border-radius: 50%; }
  .ticker { font-family: var(--font-disp); font-size: 1.25rem; font-weight: 900; letter-spacing: .04em; margin: 4px 0 3px; }
  .score-row { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
  .arrow { font-size: .95rem; font-weight: 700; }
  .score-label { font-size: .58rem; letter-spacing: .05em; opacity: .9; }
  .bar-bg { height: 3px; background: #ffffff0f; border-radius: 2px; position: relative; margin-bottom: 7px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; }
  .bar-mid { position: absolute; left: 50%; top: 0; width: 1px; height: 100%; background: #ffffff22; transform: translateX(-50%); }
  .metric { font-size: .63rem; color: var(--muted); margin-bottom: 3px; }
  .metric strong { }
  .bulls { display: flex; align-items: center; gap: 4px; }
  .bull-dot { font-size: .42rem; color: var(--green); }
  .bull-txt { font-size: .55rem; color: var(--dim); }

  /* ── DETAIL SHEET (bottom sheet on mobile) ── */
  .sheet-overlay {
    display: none; position: fixed; inset: 0; z-index: 500;
    background: #000000aa;
    animation: overlayIn .2s ease;
  }
  .sheet-overlay.open { display: block; }
  @keyframes overlayIn { from { opacity:0 } to { opacity:1 } }

  .sheet {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 600;
    background: var(--bg2);
    border-top: 1px solid var(--border2);
    border-radius: 18px 18px 0 0;
    max-height: 88dvh;
    overflow-y: auto;
    overscroll-behavior: contain;
    padding: 0 0 calc(var(--safe-bot) + 20px);
    transform: translateY(100%);
    transition: transform .3s cubic-bezier(.32,.72,0,1);
  }
  .sheet.open { transform: translateY(0); }

  .sheet-handle-bar {
    display: flex; justify-content: center; padding: 10px 0 4px;
    position: sticky; top: 0; background: var(--bg2); z-index: 1;
    border-bottom: 1px solid var(--border);
  }
  .handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border2); }

  .sheet-header { padding: 14px 18px 12px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .sheet-ticker-wrap {}
  .sheet-ticker { font-family: var(--font-disp); font-size: 2.2rem; font-weight: 900; letter-spacing: .05em; line-height: 1; display: flex; align-items: center; gap: 8px; }
  .sheet-ticker-arrow { font-size: 1.6rem; }
  .sheet-company { font-size: .7rem; color: var(--muted); margin-top: 4px; }
  .sheet-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .tag { padding: 2px 8px; border-radius: 4px; background: #1a1e22; border: 1px solid var(--border2); font-size: .58rem; color: var(--muted); }

  .score-ring { flex-shrink: 0; }

  .sheet-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
    padding: 0 14px 14px;
  }
  @media (max-width: 360px) { .sheet-grid { grid-template-columns: repeat(2, 1fr); } }
  .stat-card { background: var(--bg3); border-radius: 7px; padding: 9px 10px; border: 1px solid var(--border); }
  .sc-label { font-size: .55rem; color: var(--dim); letter-spacing: .08em; margin-bottom: 3px; }
  .sc-value { font-size: .85rem; color: var(--text); font-weight: 700; }

  .section-title { font-size: .58rem; color: var(--dim); letter-spacing: .12em; margin-bottom: 9px; }
  .analyst-section { padding: 0 14px 14px; }
  .analyst-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .al-label { font-size: .63rem; color: var(--muted); width: 78px; flex-shrink: 0; }
  .al-bar-bg { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .al-bar-fill { height: 100%; border-radius: 3px; transition: width .5s ease; }
  .al-count { font-size: .63rem; font-weight: 700; width: 22px; text-align: right; }

  .range-section { padding: 0 14px 14px; }
  .range-chart { background: var(--bg3); border-radius: 8px; padding: 28px 14px 10px; position: relative; border: 1px solid var(--border); }
  .range-pin {
    position: absolute; width: 2px; top: 8px; bottom: 28px;
    transform: translateX(-50%); border-radius: 1px;
  }
  .range-pin-label {
    position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
    font-size: .5rem; white-space: nowrap; font-family: var(--font-mono);
  }
  .range-zone { position: absolute; top: 8px; bottom: 28px; border-radius: 3px; }
  .range-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
  .rl-item { font-size: .57rem; font-family: var(--font-mono); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: calc(var(--safe-bot) + 16px); left: 50%; transform: translateX(-50%);
    background: #1a1e22ee; border: 1px solid var(--border2); border-radius: 8px;
    padding: 8px 16px; font-size: .68rem; color: var(--muted);
    pointer-events: none; opacity: 0; transition: opacity .25s;
    white-space: nowrap; z-index: 900;
  }
  .toast.show { opacity: 1; }
</style>

// ─── SECTOR COLORS ───────────────────────────────────────────────────────────
const SECTOR_COLORS = {
  "Technology":          "#4f8ef7",
  "Comm Services":       "#c47cf7",
  "Consumer Cyclical":   "#f7a04f",
  "Consumer Defensive":  "#66c99e",
  "Healthcare":          "#4fcff7",
  "Financial Services":  "#f7d44f",
  "Industrials":         "#f77b4f",
  "Energy":              "#f7604f",
  "Utilities":           "#7cf7b8",
  "Basic Materials":     "#a8b4c0",
};

// ─── SCORING ─────────────────────────────────────────────────────────────────
function computeScore(d) {
  const upsideScore = d.upsideAvg != null ? Math.tanh(d.upsideAvg / 50) : 0;
  const totalRated = (d.sb + d.b + d.h + d.s + d.ss) || 1;
  const bullScore = (d.sb * 2 + d.b) / (totalRated * 2);
  const bearPenalty = (d.s + d.ss * 2) / (totalRated * 2);
  const convictionScore = bullScore - bearPenalty;
  const range = d.hi52 - d.lo52;
  const posInRange = range > 0 ? (d.price - d.lo52) / range : 0.5;
  const rangeScore = 0.5 - posInRange;
  return 0.60 * upsideScore + 0.30 * convictionScore + 0.10 * rangeScore;
}

function scoreToColor(score) {
  if (score > 0) {
    const t = Math.min(score, 1);
    return `rgb(${Math.round(20+(1-t)*40)},${Math.round(180+t*55)},${Math.round(80+(1-t)*30)})`;
  } else {
    const t = Math.min(-score, 1);
    return `rgb(${Math.round(220+t*35)},${Math.round(60-t*40)},${Math.round(60-t*40)})`;
  }
}

function scoreLabel(s) {
  if (s >= 0.5)  return "Strong Buy";
  if (s >= 0.25) return "Buy";
  if (s >= 0.05) return "Mild Buy";
  if (s >= -0.05) return "Neutral";
  if (s >= -0.25) return "Mild Sell";
  return "Weak";
}

const fmt  = (n,d=1) => n==null||isNaN(n) ? "N/A" : (n>=0?"+":"")+n.toFixed(d)+"%";
const fmtP = n => n==null||isNaN(n) ? "N/A" : "$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtB = n => {
  if (n==null||isNaN(n)) return "N/A";
  if (n>=1000) return "$"+(n/1000).toFixed(1)+"T";
  return "$"+n.toFixed(1)+"B";
};

// ─── ENRICH ──────────────────────────────────────────────────────────────────
const DATA = RAW.map(d => ({ ...d, score: computeScore(d) }));
const SECTORS = ["All", ...Array.from(new Set(DATA.map(d=>d.sector))).sort()];

// ─── STATE ───────────────────────────────────────────────────────────────────
let state = { sector:"All", sort:"score", color:"score", search:"", selected:null };

// ─── FILTER + SORT ───────────────────────────────────────────────────────────
function getFiltered() {
  let d = DATA.slice();
  if (state.sector !== "All") d = d.filter(x => x.sector === state.sector);
  if (state.search.trim()) {
    const q = state.search.trim().toUpperCase();
    d = d.filter(x => x.ticker.includes(q) || x.company.toUpperCase().includes(q));
  }
  if (state.sort === "mcap")   d.sort((a,b) => b.mcap - a.mcap);
  else if (state.sort === "upside") d.sort((a,b) => (b.upsideAvg??-999) - (a.upsideAvg??-999));
  else d.sort((a,b) => b.score - a.score);
  return d;
}

function getColor(d) {
  if (state.color === "upside") {
    const s = d.upsideAvg != null ? Math.tanh(d.upsideAvg / 60) : 0;
    return scoreToColor(s);
  }
  return scoreToColor(d.score);
}

// ─── RENDER SECTOR PILLS ─────────────────────────────────────────────────────
function renderSectorPills() {
  const el = document.getElementById("sector-pills");
  el.innerHTML = SECTORS.map(s =>
    `<button class="pill${s===state.sector?" active":""}" data-sector="${s}">${s}</button>`
  ).join("");
  el.querySelectorAll(".pill").forEach(btn =>
    btn.addEventListener("click", () => { state.sector = btn.dataset.sector; render(); })
  );
}

// ─── RENDER STATS BAR ────────────────────────────────────────────────────────
function renderStats(filtered) {
  const withUpside = filtered.filter(d => d.upsideAvg != null);
  const avgUpside = withUpside.length
    ? withUpside.reduce((a,d)=>a+d.upsideAvg,0) / withUpside.length : 0;
  const topUpside = filtered[0]?.upsideAvg;
  const strongBuy = filtered.filter(d => {
    const t = d.sb+d.b+d.h+d.s+d.ss;
    return t>0 && (d.sb/t)>0.3;
  }).length;
  document.getElementById("stats-bar").innerHTML = [
    { label:"SHOWN",       value: filtered.length,           cls:"" },
    { label:"TOP UPSIDE",  value: fmt(topUpside),            cls:"green" },
    { label:"AVG UPSIDE",  value: fmt(avgUpside),            cls:"" },
    { label:"STRONG BUY",  value: strongBuy,                 cls:"" },
  ].map(c => `<div class="stat-chip">
    <span class="chip-label">${c.label}</span>
    <span class="chip-value ${c.cls}">${c.value}</span>
  </div>`).join("");
}

// ─── RENDER GRID ─────────────────────────────────────────────────────────────
function renderGrid(filtered) {
  const grid = document.getElementById("grid");
  grid.innerHTML = filtered.map((d, i) => {
    const col = getColor(d);
    const lbl = scoreLabel(d.score);
    const arrow = d.score > 0.1 ? "↑" : d.score < -0.1 ? "↓" : "→";
    const totalA = d.sb+d.b+d.h+d.s+d.ss;
    const bullPct = totalA > 0 ? Math.round((d.sb+d.b)/totalA*100) : 0;
    const barW = Math.abs(d.score)*100;
    const barML = d.score < 0 ? (1+d.score)*100 : 50;
    const sdot = SECTOR_COLORS[d.sector] || "#aaa";

    return `<div class="tile" data-i="${i}" style="
      background:linear-gradient(135deg,${col}18 0%,${col}2e 100%);
      border-color:${col}55;
      box-shadow:0 2px 10px ${col}22;
      animation-delay:${i*15}ms">
      <div class="rank">#${i+1}</div>
      <div class="sector-dot" style="background:${sdot}" title="${d.sector}"></div>
      <div class="ticker" style="color:${col}">${d.ticker}</div>
      <div class="score-row">
        <span class="arrow" style="color:${col}">${arrow}</span>
        <span class="score-label" style="color:${col}">${lbl}</span>
      </div>
      <div class="bar-bg">
        <div class="bar-fill" style="width:${barW}%;margin-left:${d.score>=0?50:barML}%;background:${col}"></div>
        <div class="bar-mid"></div>
      </div>
      <div class="metric">Tgt: <strong style="color:${col}">${fmt(d.upsideAvg)}</strong></div>
      <div class="bulls">
        <span class="bull-dot">●</span>
        <span class="bull-txt">${bullPct}% Bull · ${d.analysts||totalA} analysts</span>
      </div>
    </div>`;
  }).join("");

  grid.querySelectorAll(".tile").forEach(el => {
    el.addEventListener("click", () => {
      const idx = parseInt(el.dataset.i);
      openSheet(filtered[idx]);
    });
  });
}

// ─── SHEET ───────────────────────────────────────────────────────────────────
function openSheet(d) {
  state.selected = d;
  const col = getColor(d);
  const arrow = d.score > 0.1 ? "↑" : d.score < -0.1 ? "↓" : "→";
  const totalA = d.sb+d.b+d.h+d.s+d.ss;
  const scoreVal = Math.round(d.score * 100);
  const circ = 2 * Math.PI * 42;
  const dash = Math.abs(d.score) * circ;

  const stats = [
    {l:"Current Price", v:fmtP(d.price), accent:true},
    {l:"Market Cap",    v:fmtB(d.mcap)},
    {l:"P/E Ratio",     v:d.pe?d.pe.toFixed(2):"N/A"},
    {l:"52W High",      v:fmtP(d.hi52)},
    {l:"52W Low",       v:fmtP(d.lo52)},
    {l:"Analysts",      v:d.analysts||totalA},
    {l:"Avg Target",    v:fmtP(d.tgtAvg), accent:true},
    {l:"High Target",   v:fmtP(d.tgtHigh), accent:true},
    {l:"Upside Avg",    v:fmt(d.upsideAvg), accent:true},
    {l:"Upside High",   v:fmt(d.upsideHigh), accent:true},
    {l:"Upside Low",    v:fmt(d.upsideLow)},
    {l:"Target Low",    v:fmtP(d.tgtLow)},
  ];

  const analysts = [
    {l:"Strong Buy", c:d.sb,  col:"#22dd88"},
    {l:"Buy",        c:d.b,   col:"#66e0aa"},
    {l:"Hold",       c:d.h,   col:"#888"},
    {l:"Sell",       c:d.s,   col:"#e06666"},
    {l:"Strong Sell",c:d.ss,  col:"#dd2244"},
  ];

  // Price range chart data
  const lo = Math.min(d.lo52, d.tgtLow??d.lo52) * 0.95;
  const hi = Math.max(d.hi52, d.tgtHigh??d.hi52) * 1.02;
  const range = hi - lo;
  const pct = v => v!=null ? ((v-lo)/range*100) : null;

  const pins = [
    {l:"52W Lo", v:d.lo52,   c:"#f77"},
    {l:"Now",    v:d.price,  c:col},
    {l:"52W Hi", v:d.hi52,   c:"#aaa"},
    {l:"T.Low",  v:d.tgtLow, c:"#44bb88"},
    {l:"T.Avg",  v:d.tgtAvg, c:"#22dd88"},
    {l:"T.Hi",   v:d.tgtHigh,c:"#00ff99"},
  ].filter(p=>p.v!=null);

  document.getElementById("sheet-content").innerHTML = `
    <div class="sheet-header">
      <div class="sheet-ticker-wrap">
        <div class="sheet-ticker" style="color:${col}">${d.ticker}<span class="sheet-ticker-arrow">${arrow}</span></div>
        <div class="sheet-company">${d.company}</div>
        <div class="sheet-tags">
          <span class="tag">${d.sector}</span>
          <span class="tag">${d.industry}</span>
          <span class="tag">STRONG BUY</span>
        </div>
      </div>
      <div class="score-ring">
        <svg width="86" height="86" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="42" fill="none" stroke="#ffffff11" stroke-width="8"/>
          <circle cx="50" cy="50" r="42" fill="none"
            stroke="${col}" stroke-width="8"
            stroke-dasharray="${dash} ${circ}"
            stroke-linecap="round"
            transform="rotate(-90 50 50)"/>
          <text x="50" y="47" text-anchor="middle" fill="${col}" font-size="20" font-weight="700" font-family="'DM Mono',monospace">${scoreVal}</text>
          <text x="50" y="62" text-anchor="middle" fill="#888" font-size="9" font-family="'DM Mono',monospace">SCORE</text>
        </svg>
      </div>
    </div>

    <div class="sheet-grid">
      ${stats.map(s=>`<div class="stat-card">
        <div class="sc-label">${s.l}</div>
        <div class="sc-value"${s.accent?` style="color:${col}"`:""}>${s.v}</div>
      </div>`).join("")}
    </div>

    <div class="analyst-section">
      <div class="section-title">ANALYST BREAKDOWN</div>
      ${analysts.map(a=>{
        const pct2 = totalA>0?Math.round(a.c/totalA*100):0;
        return `<div class="analyst-row">
          <span class="al-label">${a.l}</span>
          <div class="al-bar-bg"><div class="al-bar-fill" style="width:${pct2}%;background:${a.col}"></div></div>
          <span class="al-count" style="color:${a.col}">${a.c}</span>
        </div>`;
      }).join("")}
    </div>

    <div class="range-section">
      <div class="section-title">PRICE RANGE vs TARGETS</div>
      <div class="range-chart" style="height:80px">
        ${d.lo52!=null&&d.hi52!=null?`<div class="range-zone" style="left:${pct(d.lo52)}%;width:${pct(d.hi52)-pct(d.lo52)}%;background:#ffffff08"></div>`:""}
        ${d.tgtLow!=null&&d.tgtHigh!=null?`<div class="range-zone" style="left:${pct(d.tgtLow)}%;width:${pct(d.tgtHigh)-pct(d.tgtLow)}%;background:${col}1a"></div>`:""}
        ${pins.map(p=>`<div class="range-pin" style="left:${pct(p.v)}%;background:${p.c}">
          <span class="range-pin-label" style="color:${p.c}">${fmtP(p.v)}</span>
        </div>`).join("")}
        <div class="range-legend" style="position:absolute;bottom:4px;left:8px;right:8px">
          ${pins.map(p=>`<span class="rl-item" style="color:${p.c}">● ${p.l}</span>`).join("")}
        </div>
      </div>
    </div>`;

  document.getElementById("overlay").classList.add("open");
  document.getElementById("sheet").classList.add("open");
}

function closeSheet() {
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("sheet").classList.remove("open");
  state.selected = null;
}

// ─── MAIN RENDER ─────────────────────────────────────────────────────────────
function render() {
  const filtered = getFiltered();
  renderSectorPills();
  renderStats(filtered);
  renderGrid(filtered);

  // update sort pills
  document.querySelectorAll("[data-sort]").forEach(b =>
    b.classList.toggle("active", b.dataset.sort === state.sort));
  // update color pills
  document.querySelectorAll("[data-color]").forEach(b =>
    b.classList.toggle("active", b.dataset.color === state.color));
}

// ─── EVENT WIRING ────────────────────────────────────────────────────────────
document.getElementById("search").addEventListener("input", e => {
  state.search = e.target.value; render();
});
document.getElementById("sort-pills").addEventListener("click", e => {
  if (e.target.dataset.sort) { state.sort = e.target.dataset.sort; render(); }
});
document.getElementById("color-pills").addEventListener("click", e => {
  if (e.target.dataset.color) { state.color = e.target.dataset.color; render(); }
});

// Swipe-down to close sheet
let touchStartY = 0;
document.getElementById("sheet").addEventListener("touchstart", e => {
  touchStartY = e.touches[0].clientY;
}, {passive:true});
document.getElementById("sheet").addEventListener("touchend", e => {
  if (e.changedTouches[0].clientY - touchStartY > 80) closeSheet();
}, {passive:true});

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();

// Toast on first load
setTimeout(() => {
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2800);
}, 800);
</script>
</body>
</html>
